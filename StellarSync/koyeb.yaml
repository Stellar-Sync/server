name: stellarsync-fleet
services:
  - name: main-server
    type: web
    ports:
      - port: 6000
        protocol: http
    routes:
      - path: /
        protocol: http
    env:
      - name: PORT
        value: '6000'
      - name: FILE_SERVER_URL
        value: 'http://file-server:6200'
    build:
      builder: docker
      dockerfile: Dockerfile.main
    resources:
      cpu: 0.5
      memory: 512Mi
    scaling:
      min: 1
      max: 3
    healthcheck:
      path: /health
      port: 6000
      initialDelaySeconds: 10
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 3
      successThreshold: 1

  - name: file-server
    type: web
    ports:
      - port: 6200
        protocol: http
    env:
      - name: PORT
        value: '6200'
    build:
      builder: docker
      dockerfile: Dockerfile.fileserver
    resources:
      cpu: 0.5
      memory: 1Gi
    scaling:
      min: 1
      max: 2
    healthcheck:
      path: /health
      port: 6200
      initialDelaySeconds: 10
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 3
      successThreshold: 1
