name: stellarsync-server
service:
  name: stellarsync-server
  type: web
  ports:
    - port: 6000
      protocol: http
  routes:
    - path: /
      protocol: http
  env:
    - name: PORT
      value: '6000'
  build:
    builder: go
    buildCommand: go build -o stellarsync-server ./cmd/combined
    runCommand: ./stellarsync-server
  resources:
    cpu: 0.5
    memory: 512Mi
  scaling:
    min: 1
    max: 3
  healthcheck:
    path: /
    port: 6000
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1
