apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-server
  namespace: stellarsync
  labels:
    app: main-server
    component: websocket
spec:
  replicas: 2
  selector:
    matchLabels:
      app: main-server
  template:
    metadata:
      labels:
        app: main-server
        component: websocket
    spec:
      containers:
        - name: main-server
          image: kasuaberra/stellarsync-main:latest
          ports:
            - containerPort: 6000
              name: http
          env:
            - name: PORT
              value: '6000'
            - name: FILE_SERVER_URL
              value: 'http://file-server:80'
          resources:
            requests:
              memory: '256Mi'
              cpu: '250m'
            limits:
              memory: '512Mi'
              cpu: '500m'
          livenessProbe:
            httpGet:
              path: /health
              port: 6000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 6000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          imagePullPolicy: Always
