apiVersion: apps/v1
kind: Deployment
metadata:
  name: file-server
  namespace: stellarsync
  labels:
    app: file-server
    component: storage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: file-server
  template:
    metadata:
      labels:
        app: file-server
        component: storage
    spec:
      containers:
        - name: file-server
          image: kasuaberra/stellarsync-fileserver:latest
          ports:
            - containerPort: 6200
              name: http
          env:
            - name: PORT
              value: '6200'
          resources:
            requests:
              memory: '512Mi'
              cpu: '250m'
            limits:
              memory: '1Gi'
              cpu: '500m'
          volumeMounts:
            - name: file-storage
              mountPath: /app/uploads
          livenessProbe:
            httpGet:
              path: /health
              port: 6200
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 6200
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          imagePullPolicy: Always
      volumes:
        - name: file-storage
          persistentVolumeClaim:
            claimName: file-storage-pvc
