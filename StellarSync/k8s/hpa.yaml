apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: main-server-hpa
  namespace: stellarsync
  labels:
    app: main-server
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: main-server
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: file-server-hpa
  namespace: stellarsync
  labels:
    app: file-server
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: file-server
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70


