version: '3.8'

services:
  main-server:
    image: kasuaberra/stellarsync-main:latest
    container_name: stellarsync-main
    ports:
      - '6000:6000'
    environment:
      - FILE_SERVER_URL=http://file-server:6200
    networks:
      - stellarsync-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:6000/health']
      interval: 30s
      timeout: 10s
      retries: 3

  file-server:
    image: kasuaberra/stellarsync-fileserver:latest
    container_name: stellarsync-fileserver
    ports:
      - '6200:6200'
    volumes:
      - file-storage:/app/files
    networks:
      - stellarsync-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:6200/health']
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: stellarsync-nginx
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./logs:/var/log/nginx
    depends_on:
      - main-server
      - file-server
    networks:
      - stellarsync-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--quiet',
          '--tries=1',
          '--spider',
          'http://localhost/health',
        ]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  file-storage:
    driver: local

networks:
  stellarsync-network:
    driver: bridge
